<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端教室座位管理系統</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --fixed: #ffeaa7; --fixed-border: #fdcb6e; --primary: #0984e3; --bg: #f4f7f6; --success: #55efc4; --warning: #fab1a0; --purple: #6c5ce7; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄 */
        .sidebar { width: 360px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.05); overflow-y: auto; display: flex; flex-direction: column; }
        .config-group { margin-bottom: 20px; padding: 15px; border-radius: 10px; background: #f9f9f9; border: 1px solid #eee; }
        h3 { margin-top: 0; font-size: 18px; color: #2d3436; border-left: 5px solid var(--primary); padding-left: 10px; margin-bottom: 15px; }
        
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #636e72; font-size: 15px; }
        input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; font-size: 16px;
        }
        textarea { height: 140px; resize: none; }
        
        /* 側邊欄按鈕加大 */
        button { width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }
        
        .btn-new { background: #e17055; color: white; }
        .btn-cloud { background: var(--purple); color: white; }
        .btn-load { background: var(--success); color: #2d3436; }
        .btn-init { background: #2d3436; color: white; }
        .btn-shuffle { background: var(--primary); color: white; font-size: 20px; }
        .btn-img { background: var(--warning); color: #2d3436; }
        .btn-out { background: #dfe6e9; color: #2d3436; margin-top: auto; font-size: 18px; }
        
        /* 主畫面樣式 */
        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 40px; }
        #capture-area { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); min-width: fit-content; position: relative; }
        #class-title-display { text-align: center; font-size: 3rem; margin: 0 0 40px 0; color: #2d3436; font-weight: 800; letter-spacing: 2px; }
        .teacher-area { display: flex; justify-content: center; margin-bottom: 50px; }
        .teacher-desk { width: 400px; height: 90px; background: #dfe6e9; border: 2px solid #b2bec3; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2.5rem; color: #636e72; letter-spacing: 30px; }
        
        .grid { display: grid; gap: 18px; justify-content: center; }
        .seat { width: 120px; height: 90px; border: 2px solid #e1e1e1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; cursor: grab; position: relative; transition: all 0.2s ease; user-select: none; }
        .seat.is-fixed { background: var(--fixed); border-color: var(--fixed-border); }
        .student-name { font-size: 1.4rem; font-weight: bold; pointer-events: none; color: #2d3436; }
        .lock-icon { position: absolute; top: 5px; right: 8px; font-size: 14px; color: #e17055; pointer-events: none; }
        
        /* 登入畫面加大優化 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        #auth-overlay.hidden { display: none; }
        .auth-box { background: white; padding: 50px; border-radius: 20px; width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-box h2 { font-size: 2.5rem; margin-bottom: 35px; color: #2d3436; }
        .auth-row { display: flex; align-items: center; margin-bottom: 20px; }
        .auth-row label { width: 100px; text-align: right; margin-bottom: 0; margin-right: 15px; font-size: 20px; flex-shrink: 0; color: #2d3436; }
        .auth-row input { margin-bottom: 0; padding: 15px; font-size: 18px; }
        .btn-auth { font-size: 22px; padding: 16px; margin-top: 20px; background: var(--primary); color: white; }
        .auth-switch { margin-top: 20px; font-size: 18px; color: #0984e3; cursor: pointer; text-decoration: underline; font-weight: bold; }

        /* 教師帳號資訊加大 */
        .user-info { font-size: 18px; color: #2d3436; margin-top: 15px; text-align: center; background: #f1f2f6; padding: 10px; border-radius: 8px; }
        #user-display { font-weight: bold; color: var(--primary); display: block; margin-top: 5px; word-break: break-all; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">教師登入系統</h2>
        <div class="auth-row">
            <label>帳號：</label>
            <input type="email" id="auth-email" placeholder="請輸入電子信箱">
        </div>
        <div class="auth-row">
            <label>密碼：</label>
            <input type="password" id="auth-password" placeholder="請輸入密碼">
        </div>
        <button class="btn-auth" id="btn-auth-main" onclick="handleAuth()">登入系統</button>
        <div class="auth-switch" id="auth-switch-text" onclick="toggleAuthMode()">還沒有帳號？點此註冊</div>
    </div>
</div>

<div class="sidebar">
    <div class="config-group">
        <h3>🏫 班級檔案管理</h3>
        <button class="btn-new" onclick="createNewClass()">➕ 建立新班級</button>
        
        <label>選擇已儲存班級</label>
        <select id="classDropdown">
            <option value="">-- 讀取中... --</option>
        </select>
        
        <div style="display: flex; gap: 8px;">
             <button class="btn-load" onclick="loadFromDropdown()">📂 載入班級</button>
            <button class="btn-cloud" onclick="saveToCloud()">☁️ 儲存檔案</button>
           
        </div>
        <button class="btn-img" onclick="downloadImage()">🖼️ 匯出座位圖片</button>
    </div>

    <div class="config-group">
        <h3>✏️ 教室配置</h3>
        <label>班級名稱</label>
        <input type="text" id="classTitle" oninput="syncTitle()" placeholder="例如：資二甲">
        <div style="display: flex; gap: 10px;">
            <div><label>欄數</label><input type="number" id="cols" value="5" min="1"></div>
            <div><label>列數</label><input type="number" id="rows" value="5" min="1"></div>
        </div>
        <button class="btn-init" onclick="confirmInit()">🔄 重新佈局 (清空座位)</button>
    </div>

    <div class="config-group">
        <h3>👥 學生抽籤名單</h3>
        <textarea id="studentList" placeholder="每行輸入一位學生姓名..."></textarea>
        <button class="btn-shuffle" onclick="shuffleNonFixed()">🎲 開始隨機抽籤</button>
    </div>

    <div class="user-info">
        目前教師帳號：
        <span id="user-display">未登入</span>
    </div>
    <button class="btn-out" onclick="handleLogout()">🚪 登出系統</button>
</div>

<div class="main-content">
    <div id="capture-area">
        <h1 id="class-title-display">請輸入班級名稱</h1>
        <div class="teacher-area"><div class="teacher-desk">講桌</div></div>
        <div id="grid" class="grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3EIJA7kY5if8ngtVcWNQwUILJsTP5p4I",
        authDomain: "seat-ffa1d.firebaseapp.com",
        projectId: "seat-ffa1d",
        storageBucket: "seat-ffa1d.firebasestorage.app",
        messagingSenderId: "689854695283",
        appId: "1:689854695283:web:c43c7ccfd2ef2a69c3e706"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let isRegisterMode = false;
    let draggedElement = null;
    const gridEl = document.getElementById('grid');

    async function refreshClassList() {
        if (!currentUser) return;
        const dropdown = document.getElementById('classDropdown');
        dropdown.innerHTML = '<option value="">-- 讀取中... --</option>';
        try {
            const querySnapshot = await getDocs(collection(db, "users", currentUser.uid, "classes"));
            dropdown.innerHTML = '<option value="">-- 請選擇班級 --</option>';
            querySnapshot.forEach((doc) => {
                const option = document.createElement('option');
                option.value = doc.id;
                option.textContent = doc.id;
                dropdown.appendChild(option);
            });
        } catch (e) { console.error("抓取失敗", e); }
    }

    window.loadFromDropdown = () => {
        const selected = document.getElementById('classDropdown').value;
        if (!selected) return alert("請先從下拉選單選擇班級");
        document.getElementById('classTitle').value = selected;
        loadSpecificClass();
    };

    window.createNewClass = () => {
        if(!confirm('確定要建立新班級？目前未儲存內容將遺失。')) return;
        document.getElementById('classTitle').value = "";
        document.getElementById('studentList').value = "";
        syncTitle();
        initGrid();
        document.getElementById('classTitle').focus();
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        if(!email || !password) return alert('請完整填寫帳號與密碼');
        try {
            if (isRegisterMode) {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('註冊成功！');
            } else { await signInWithEmailAndPassword(auth, email, password); }
        } catch (error) { alert('認證失敗，請檢查帳號密碼或網路連線。'); }
    };

    window.handleLogout = () => {
        signOut(auth).then(() => {
            document.getElementById('auth-email').value = "";
            document.getElementById('auth-password').value = "";
        });
    };

    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "教師註冊系統" : "教師登入系統";
        document.getElementById('btn-auth-main').innerText = isRegisterMode ? "立即註冊" : "登入系統";
        document.getElementById('auth-switch-text').innerText = isRegisterMode ? "已有帳號？點此登入" : "還沒有帳號？點此註冊";
    };

    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('auth-overlay');
        if (user) {
            currentUser = user;
            overlay.classList.add('hidden');
            document.getElementById('user-display').innerText = user.email;
            initGrid(); 
            refreshClassList(); 
        } else {
            currentUser = null;
            overlay.classList.remove('hidden');
            gridEl.innerHTML = '';
        }
    });

    window.syncTitle = () => { 
        const rawTitle = document.getElementById('classTitle').value;
        const displayTitle = rawTitle ? rawTitle + "座位表" : "請輸入班級名稱";
        document.getElementById('class-title-display').innerText = displayTitle; 
    };
    
    window.confirmInit = () => { if(confirm('確定要重新佈局並清空所有座位嗎？')) initGrid(); };

    function initGrid() {
        const c = parseInt(document.getElementById('cols').value) || 5;
        const r = parseInt(document.getElementById('rows').value) || 5;
        gridEl.style.gridTemplateColumns = `repeat(${c}, 120px)`;
        gridEl.innerHTML = '';
        for (let i = 0; i < c * r; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat empty';
            seat.draggable = true;
            seat.innerHTML = '<span class="student-name"></span>';
            seat.onclick = () => {
                const old = seat.querySelector('.student-name').innerText;
                const name = prompt("編輯學生姓名：", old);
                if (name !== null) updateSeat(seat, name.trim(), name.trim() !== "");
            };
            seat.oncontextmenu = (e) => {
                e.preventDefault();
                if (!seat.classList.contains('empty')) {
                    seat.classList.toggle('is-fixed');
                    updateLockIcon(seat);
                }
            };
            setupDragAndDrop(seat);
            gridEl.appendChild(seat);
        }
    }

    function updateSeat(seat, name, fixed) {
        const nameEl = seat.querySelector('.student-name');
        nameEl.innerText = name;
        if (name) {
            seat.className = 'seat occupied';
            if (fixed) seat.classList.add('is-fixed');
        } else { 
            seat.className = 'seat empty'; 
            seat.classList.remove('is-fixed'); 
        }
        updateLockIcon(seat);
    }

    function updateLockIcon(seat) {
        const icon = seat.querySelector('.lock-icon');
        if (icon) icon.remove();
        if (seat.classList.contains('is-fixed')) {
            seat.insertAdjacentHTML('beforeend', '<span class="lock-icon">📌</span>');
        }
    }

    function setupDragAndDrop(seat) {
        seat.ondragstart = (e) => {
            if(seat.classList.contains('empty')) return e.preventDefault();
            draggedElement = seat;
        };
        seat.ondragover = (e) => e.preventDefault();
        seat.ondrop = (e) => {
            e.preventDefault();
            if (draggedElement && draggedElement !== seat) {
                const tempHTML = seat.innerHTML;
                const tempClass = seat.className;
                seat.innerHTML = draggedElement.innerHTML;
                seat.className = draggedElement.className;
                draggedElement.innerHTML = tempHTML;
                draggedElement.className = tempClass;
            }
        };
    }

    window.saveToCloud = async () => {
        if (!currentUser) return;
        const classTitle = document.getElementById('classTitle').value.trim();
        if (!classTitle) return alert("請輸入班級名稱");
        const seatData = [];
        document.querySelectorAll('.seat').forEach(seat => {
            seatData.push({ name: seat.querySelector('.student-name').innerText, isFixed: seat.classList.contains('is-fixed') });
        });
        try {
            await setDoc(doc(db, "users", currentUser.uid, "classes", classTitle), {
                cols: document.getElementById('cols').value,
                rows: document.getElementById('rows').value,
                rawList: document.getElementById('studentList').value,
                layout: seatData
            });
            alert('☁️ 已成功同步至雲端');
            refreshClassList();
        } catch (e) { alert('儲存失敗'); }
    };

    async function loadSpecificClass() {
        const classTitle = document.getElementById('classTitle').value;
        const docSnap = await getDoc(doc(db, "users", currentUser.uid, "classes", classTitle));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('cols').value = data.cols;
            document.getElementById('rows').value = data.rows;
            document.getElementById('studentList').value = data.rawList;
            syncTitle();
            initGrid();
            const seats = document.querySelectorAll('.seat');
            data.layout.forEach((sDat, i) => { if(seats[i]) updateSeat(seats[i], sDat.name, sDat.isFixed); });
        }
    }

    window.shuffleNonFixed = () => {
        const listText = document.getElementById('studentList').value;
        let students = listText.split('\n').map(s => s.trim()).filter(s => s !== "");
        const allSeats = Array.from(document.querySelectorAll('.seat'));
        const availableSeats = allSeats.filter(s => !s.classList.contains('is-fixed'));
        if (students.length > availableSeats.length) return alert('學生人數大於可用座位數！');
        students.sort(() => Math.random() - 0.5);
        availableSeats.forEach(s => updateSeat(s, "", false));
        students.forEach((name, i) => updateSeat(availableSeats[i], name, false));
    };

    window.downloadImage = () => {
        const title = document.getElementById('classTitle').value || "座位表";
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${title}座位表.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    };
</script>
</body>
</html>
