<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端教室座位管理系統</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --fixed: #ffeaa7; --fixed-border: #fdcb6e; --primary: #0984e3; --bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 340px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.05); overflow-y: auto; display: flex; flex-direction: column; }
        .config-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        h3 { margin-top: 0; color: #2d3436; border-left: 5px solid var(--primary); padding-left: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #636e72; }
        input[type="text"], input[type="number"], input[type="email"], input[type="password"], textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px;
        }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 14px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-cloud { background: #6c5ce7; color: white; }
        .btn-init { background: #2d3436; color: white; }
        .btn-shuffle { background: var(--primary); color: white; font-size: 16px; }
        .btn-out { background: #fab1a0; color: #2d3436; margin-top: auto; }
        .main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 40px; }
        #capture-area { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); min-width: fit-content; position: relative; }
        #class-title-display { text-align: center; font-size: 2.5rem; margin: 0 0 40px 0; color: #2d3436; font-weight: 800; letter-spacing: 2px; }
        .teacher-area { display: flex; justify-content: center; margin-bottom: 50px; }
        .teacher-desk { width: 300px; height: 60px; background: #dfe6e9; border: 2px solid #b2bec3; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: #636e72; letter-spacing: 15px; }
        .grid { display: grid; gap: 15px; justify-content: center; }
        .seat { 
            width: 110px; height: 80px; border: 2px solid #e1e1e1; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; cursor: grab; position: relative; transition: all 0.2s ease; user-select: none;
        }
        .seat:hover:not(.empty) { border-color: var(--primary); box-shadow: 0 5px 15px rgba(9, 132, 227, 0.1); }
        .seat.is-fixed { background: var(--fixed); border-color: var(--fixed-border); }
        .seat.dragging { opacity: 0.2; transform: scale(0.8); }
        .student-name { font-size: 1.2rem; font-weight: bold; pointer-events: none; color: #2d3436; }
        .lock-icon { position: absolute; top: 5px; right: 8px; font-size: 12px; color: #e17055; pointer-events: none; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; backdrop-filter: blur(5px); }
        .auth-box { background: white; padding: 40px; border-radius: 15px; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
        #auth-overlay.hidden { opacity: 0; pointer-events: none; }
        .auth-switch { margin-top: 15px; font-size: 14px; color: #636e72; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">教師登入</h2>
        <input type="email" id="auth-email" placeholder="電子郵件">
        <input type="password" id="auth-password" placeholder="密碼">
        <button class="btn-shuffle" id="btn-auth-main" onclick="handleAuth()">登入</button>
        <div class="auth-switch" id="auth-switch-text" onclick="toggleAuthMode()">還沒有帳號？註冊</div>
    </div>
</div>

<div class="sidebar">
    <div class="config-group">
        <h3>✏️ 班級設定</h3>
        <label>座位表標題</label>
        <input type="text" id="classTitle" value="三年一班座位表" oninput="syncTitle()">
        <div style="display: flex; gap: 10px;">
            <div><label>欄數</label><input type="number" id="cols" value="5" min="1"></div>
            <div><label>列數</label><input type="number" id="rows" value="6" min="1"></div>
        </div>
        <button class="btn-init" onclick="confirmInit()">1. 重設教室佈局</button>
    </div>
    <div class="config-group">
        <h3>👥 待抽學生名單</h3>
        <textarea id="studentList" placeholder="每行一人..."></textarea>
        <button class="btn-shuffle" onclick="shuffleNonFixed()">2. 開始隨機抽籤</button>
    </div>
    <div class="config-group">
        <button class="btn-cloud" onclick="saveToCloud()">☁️ 儲存至雲端</button>
        <button style="background: #fab1a0; color: #2d3436;" onclick="downloadImage()">🖼️ 匯出圖片</button>
    </div>
    <div style="font-size: 12px; color: #b2bec3; margin-top: 10px;">
        目前使用者: <span id="user-display">---</span>
    </div>
    <button class="btn-out" onclick="handleLogout()">登出</button>
</div>

<div class="main-content">
    <div id="capture-area">
        <h1 id="class-title-display">三年一班座位表</h1>
        <div class="teacher-area"><div class="teacher-desk">講桌</div></div>
        <div id="grid" class="grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3EIJA7kY5if8ngtVcWNQwUILJsTP5p4I",
        authDomain: "seat-ffa1d.firebaseapp.com",
        projectId: "seat-ffa1d",
        storageBucket: "seat-ffa1d.firebasestorage.app",
        messagingSenderId: "689854695283",
        appId: "1:689854695283:web:c43c7ccfd2ef2a69c3e706"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let isRegisterMode = false;
    let draggedElement = null;
    const gridEl = document.getElementById('grid');

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        if(!email || !password) return alert('請輸入完整欄位');
        try {
            if (isRegisterMode) {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('註冊成功！');
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
        } catch (error) { alert('認證失敗: ' + error.message); }
    };

    window.handleLogout = () => signOut(auth);
    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "教師註冊" : "教師登入";
        document.getElementById('btn-auth-main').innerText = isRegisterMode ? "註冊" : "登入";
        document.getElementById('auth-switch-text').innerText = isRegisterMode ? "已有帳號？登入" : "還沒有帳號？註冊";
    };

    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('auth-overlay');
        if (user) {
            currentUser = user;
            overlay.classList.add('hidden');
            document.getElementById('user-display').innerText = user.email;
            loadFromCloud();
        } else {
            currentUser = null;
            overlay.classList.remove('hidden');
            gridEl.innerHTML = '';
        }
    });

    window.syncTitle = () => { document.getElementById('class-title-display').innerText = document.getElementById('classTitle').value; };
    window.confirmInit = () => { if(confirm('重設佈局將清空當前所有座位，確定嗎？')) initGrid(); };

    function initGrid() {
        const c = parseInt(document.getElementById('cols').value) || 5;
        const r = parseInt(document.getElementById('rows').value) || 6;
        gridEl.style.gridTemplateColumns = `repeat(${c}, 110px)`;
        gridEl.innerHTML = '';
        for (let i = 0; i < c * r; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat empty';
            seat.draggable = true;
            seat.innerHTML = '<span class="student-name"></span>';
            seat.onclick = () => {
                const old = seat.querySelector('.student-name').innerText;
                const name = prompt("指定此位置學生：", old);
                if (name !== null) updateSeat(seat, name.trim(), name.trim() !== "");
            };
            seat.oncontextmenu = (e) => {
                e.preventDefault();
                if (!seat.classList.contains('empty')) {
                    seat.classList.toggle('is-fixed');
                    updateLockIcon(seat);
                }
            };
            setupDragAndDrop(seat);
            gridEl.appendChild(seat);
        }
    }

    function updateSeat(seat, name, fixed) {
        const nameEl = seat.querySelector('.student-name');
        nameEl.innerText = name;
        if (name) {
            seat.className = 'seat occupied';
            if (fixed) seat.classList.add('is-fixed');
        } else { seat.className = 'seat empty'; seat.classList.remove('is-fixed'); }
        updateLockIcon(seat);
    }

    function updateLockIcon(seat) {
        const icon = seat.querySelector('.lock-icon');
        if (icon) icon.remove();
        if (seat.classList.contains('is-fixed')) {
            seat.insertAdjacentHTML('beforeend', '<span class="lock-icon">📌</span>');
        }
    }

    function setupDragAndDrop(seat) {
        seat.ondragstart = (e) => {
            if(seat.classList.contains('empty')) return e.preventDefault();
            draggedElement = seat;
            seat.classList.add('dragging');
        };
        seat.ondragend = () => seat.classList.remove('dragging');
        seat.ondragover = (e) => e.preventDefault();
        seat.ondrop = (e) => {
            e.preventDefault();
            if (draggedElement && draggedElement !== seat) {
                const tHTML = seat.innerHTML;
                const tClass = seat.className;
                seat.innerHTML = draggedElement.innerHTML;
                seat.className = draggedElement.className;
                draggedElement.innerHTML = tHTML;
                draggedElement.className = tClass;
            }
        };
    }

    window.shuffleNonFixed = () => {
        const listText = document.getElementById('studentList').value;
        let students = listText.split('\n').map(s => s.trim()).filter(s => s !== "");
        const allSeats = Array.from(document.querySelectorAll('.seat'));
        const availableSeats = allSeats.filter(s => !s.classList.contains('is-fixed'));
        if (students.length > availableSeats.length) return alert('座位不夠！');
        students.sort(() => Math.random() - 0.5);
        availableSeats.forEach(s => updateSeat(s, "", false));
        students.forEach((name, i) => updateSeat(availableSeats[i], name, false));
    };

    window.saveToCloud = async () => {
        if (!currentUser) return;
        const btn = document.querySelector('.btn-cloud');
        btn.innerText = "儲存中...";
        const seatData = [];
        document.querySelectorAll('.seat').forEach(seat => {
            seatData.push({
                name: seat.querySelector('.student-name').innerText,
                isFixed: seat.classList.contains('is-fixed')
            });
        });
        const config = {
            title: document.getElementById('classTitle').value,
            cols: document.getElementById('cols').value,
            rows: document.getElementById('rows').value,
            rawList: document.getElementById('studentList').value,
            layout: seatData
        };
        try {
            await setDoc(doc(db, "users", currentUser.uid, "config", "current"), config);
            alert('已存至雲端！');
        } catch (e) { alert('儲存失敗: ' + e.message); }
        btn.innerText = "☁️ 儲存至雲端";
    };

    async function loadFromCloud() {
        const docSnap = await getDoc(doc(db, "users", currentUser.uid, "config", "current"));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('classTitle').value = data.title;
            document.getElementById('cols').value = data.cols;
            document.getElementById('rows').value = data.rows;
            document.getElementById('studentList').value = data.rawList;
            syncTitle();
            initGrid();
            const seats = document.querySelectorAll('.seat');
            data.layout.forEach((sDat, i) => { if(seats[i]) updateSeat(seats[i], sDat.name, sDat.isFixed); });
        } else { initGrid(); syncTitle(); }
    }

    window.downloadImage = () => {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `座位表.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    };
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
